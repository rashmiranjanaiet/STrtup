services:
  - type: web
    name: team-flow
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: HF_MODEL
        value: meta-llama/Llama-3.1-8B-Instruct
